<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <style>
      .bg{fill:#11131a}
      .title{font:900 34px system-ui,"Microsoft YaHei",sans-serif;fill:#fff7e9}
      .hint{font:500 18px system-ui,"Microsoft YaHei",sans-serif;fill:#aeb6c8}
      .label{font:900 22px system-ui,"Microsoft YaHei",sans-serif;fill:#fff7e9}
      .small{font:700 15px system-ui,"Microsoft YaHei",sans-serif;fill:#394052}
      .desc{font:600 14px system-ui,"Microsoft YaHei",sans-serif;fill:#aeb6c8}
      .card-face{fill:url(#face);stroke:rgba(255,255,255,.35);stroke-width:1}
      .card-title{font:900 22px system-ui,"Microsoft YaHei",sans-serif;fill:#251f19}
      .card-text{font:700 15px system-ui,"Microsoft YaHei",sans-serif;fill:#6d6254}
      .card-emoji{font:900 30px system-ui,"Apple Color Emoji","Segoe UI Emoji",sans-serif}
      .group{filter:url(#cardShadow)}
      .spark{fill:#fff;opacity:.85}
      .gold{fill:#ffc857}
      .cyan{fill:#48d597}
      .purple{fill:#8a82ff}

      #ring2{animation:pulse 1.45s ease-in-out infinite}
      #sweep3{animation:sweep 1.8s ease-in-out infinite}
      #sparkGroup4{animation:sparkMove 2.4s linear infinite}
      #liquid5{animation:hue 3.6s linear infinite}
      #corners6{animation:cornerGlow 1.6s ease-in-out infinite}

      @keyframes pulse{0%,100%{opacity:.55;stroke-width:8}50%{opacity:1;stroke-width:15}}
      @keyframes sweep{0%{transform:translateX(-210px);opacity:.15}45%{opacity:.95}100%{transform:translateX(210px);opacity:.15}}
      @keyframes sparkMove{to{transform:rotate(360deg)}}
      @keyframes hue{to{filter:hue-rotate(360deg)}}
      @keyframes cornerGlow{0%,100%{opacity:.65}50%{opacity:1}}
    </style>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e9"/>
      <stop offset="1" stop-color="#d8c7ad"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4d5a"/>
      <stop offset=".25" stop-color="#ffc857"/>
      <stop offset=".5" stop-color="#48d597"/>
      <stop offset=".75" stop-color="#8a82ff"/>
      <stop offset="1" stop-color="#ff4d5a"/>
    </linearGradient>
    <linearGradient id="rainbowFlow" x1="0" y1="0" x2="1" y2="1">
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="3s" repeatCount="indefinite"/>
      <stop offset="0" stop-color="#ff4d5a"/>
      <stop offset=".25" stop-color="#ffc857"/>
      <stop offset=".5" stop-color="#48d597"/>
      <stop offset=".75" stop-color="#8a82ff"/>
      <stop offset="1" stop-color="#ff4d5a"/>
    </linearGradient>
    <linearGradient id="holo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff00"/>
      <stop offset=".35" stop-color="#ffffff22"/>
      <stop offset=".5" stop-color="#ffffffdd"/>
      <stop offset=".65" stop-color="#8a82ff66"/>
      <stop offset="1" stop-color="#ffffff00"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4d5a"/>
      <stop offset=".33" stop-color="#48d597"/>
      <stop offset=".66" stop-color="#38a3ff"/>
      <stop offset="1" stop-color="#ffc857"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect class="bg" width="1200" height="820"/>
  <circle cx="100" cy="70" r="210" fill="#ff4d5a" opacity=".12"/>
  <circle cx="1040" cy="190" r="260" fill="#8a82ff" opacity=".14"/>
  <circle cx="730" cy="740" r="280" fill="#48d597" opacity=".08"/>

  <text class="title" x="60" y="70">高级牌炫彩边框候选</text>
  <text class="hint" x="60" y="102">这是独立预览图，真正接入游戏时我会把你选中的效果写进 .card.advanced</text>

  <!-- Option 1 -->
  <g class="group" transform="translate(80 150)">
    <text class="label" x="0" y="-18">1 当前版：旋转彩虹环</text>
    <text class="desc" x="0" y="292">优点：清楚、轻量、辨识度高</text>
    <rect x="-7" y="-7" width="254" height="314" rx="25" fill="none" stroke="url(#rainbowFlow)" stroke-width="12"/>
    <rect class="card-face" x="0" y="0" width="240" height="300" rx="22"/>
    <text class="card-emoji" x="22" y="48">🌈</text>
    <text class="card-title" x="22" y="98">高级查看</text>
    <text class="card-text" x="22" y="252">查看下一张炸弹位置</text>
  </g>

  <!-- Option 2 -->
  <g class="group" transform="translate(480 150)">
    <text class="label" x="0" y="-18">2 霓虹呼吸光</text>
    <text class="desc" x="0" y="292">优点：高级感强，动态不乱</text>
    <rect id="ring2" x="-8" y="-8" width="256" height="316" rx="26" fill="none" stroke="#8a82ff" filter="url(#neon)"/>
    <rect x="-4" y="-4" width="248" height="308" rx="24" fill="none" stroke="#48d597" stroke-width="3" opacity=".95"/>
    <rect class="card-face" x="0" y="0" width="240" height="300" rx="22"/>
    <text class="card-emoji" x="22" y="48">✨</text>
    <text class="card-title" x="22" y="98">高级帮助</text>
    <text class="card-text" x="22" y="252">不能被禁止响应</text>
  </g>

  <!-- Option 3 -->
  <g class="group" transform="translate(880 150)">
    <text class="label" x="0" y="-18">3 镭射扫光</text>
    <text class="desc" x="0" y="292">优点：像稀有卡，出牌时很帅</text>
    <rect x="-6" y="-6" width="252" height="312" rx="25" fill="none" stroke="url(#rainbow)" stroke-width="8"/>
    <rect class="card-face" x="0" y="0" width="240" height="300" rx="22"/>
    <rect id="sweep3" x="0" y="0" width="90" height="300" rx="22" fill="url(#holo)" transform="skewX(-14)"/>
    <text class="card-emoji" x="22" y="48">💎</text>
    <text class="card-title" x="22" y="98">高级交换</text>
    <text class="card-text" x="22" y="252">被禁止后才生效</text>
  </g>

  <!-- Option 4 -->
  <g class="group" transform="translate(80 520)">
    <text class="label" x="0" y="-18">4 星点环绕</text>
    <text class="desc" x="0" y="292">优点：活泼，符合猫咪互坑感</text>
    <rect x="-6" y="-6" width="252" height="312" rx="25" fill="none" stroke="#ffc857" stroke-width="5" opacity=".75"/>
    <g id="sparkGroup4" transform-origin="120px 150px">
      <circle class="spark gold" cx="10" cy="14" r="5"/>
      <circle class="spark cyan" cx="232" cy="46" r="4"/>
      <circle class="spark purple" cx="220" cy="284" r="5"/>
      <circle class="spark" cx="20" cy="246" r="3"/>
      <path class="spark gold" d="M120 -14l5 13 13 5-13 5-5 13-5-13-13-5 13-5z"/>
    </g>
    <rect class="card-face" x="0" y="0" width="240" height="300" rx="22"/>
    <text class="card-emoji" x="22" y="48">⭐</text>
    <text class="card-title" x="22" y="98">高级切牌</text>
    <text class="card-text" x="22" y="252">不公开切了几张</text>
  </g>

  <!-- Option 5 -->
  <g class="group" transform="translate(480 520)">
    <text class="label" x="0" y="-18">5 流体彩边</text>
    <text class="desc" x="0" y="292">优点：最梦幻，适合“神级牌”</text>
    <rect id="liquid5" x="-9" y="-9" width="258" height="318" rx="28" fill="none" stroke="url(#liquid)" stroke-width="14" filter="url(#neon)"/>
    <rect x="-1" y="-1" width="242" height="302" rx="23" fill="none" stroke="#ffffffaa" stroke-width="2"/>
    <rect class="card-face" x="0" y="0" width="240" height="300" rx="22"/>
    <text class="card-emoji" x="22" y="48">🌀</text>
    <text class="card-title" x="22" y="98">高级禁止</text>
    <text class="card-text" x="22" y="252">取消别人的禁止</text>
  </g>

  <!-- Option 6 -->
  <g class="group" transform="translate(880 520)">
    <text class="label" x="0" y="-18">6 金色四角 + 微彩</text>
    <text class="desc" x="0" y="292">优点：最稳，像实体桌游高级卡</text>
    <rect x="-5" y="-5" width="250" height="310" rx="25" fill="none" stroke="#ffc857" stroke-width="5"/>
    <rect x="-9" y="-9" width="258" height="318" rx="28" fill="none" stroke="url(#rainbow)" stroke-width="3" opacity=".75"/>
    <g id="corners6">
      <path class="gold" d="M-9 -9h54v10h-44v44h-10z"/>
      <path class="gold" d="M249 -9h-54v10h44v44h10z"/>
      <path class="gold" d="M-9 309h54v-10h-44v-44h-10z"/>
      <path class="gold" d="M249 309h-54v-10h44v-44h10z"/>
    </g>
    <rect class="card-face" x="0" y="0" width="240" height="300" rx="22"/>
    <text class="card-emoji" x="22" y="48">👑</text>
    <text class="card-title" x="22" y="98">高级牌</text>
    <text class="card-text" x="22" y="252">稳重但仍然闪</text>
  </g>
</svg>
