<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>炸弹猫咪</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="ambient" aria-hidden="true">
    <span>💣</span><span>🐱</span><span>🃏</span><span>✂️</span><span>🔥</span><span>💥</span>
  </div>
  <main>
    <section id="welcome" class="panel welcome">
      <div class="logo"><span>💣</span>BOOM!</div>
      <h1>炸弹猫咪 😼</h1>
      <p>2～6 人实时策略互坑卡牌游戏</p>
      <input id="name" maxlength="12" placeholder="你的昵称">
      <select id="gameMode" class="mode-select" aria-label="游戏模式">
        <option value="advanced" selected>高级场：高级牌 + 特殊炸弹</option>
        <option value="normal">普通场：无高级牌和特殊炸弹</option>
      </select>
      <button id="create">✨ 创建房间</button>
      <div class="join">
        <input id="code" maxlength="6" inputmode="numeric" placeholder="6 位房间码">
        <button id="join">🚪 加入</button>
      </div>
    </section>

    <section id="game" class="hidden">
      <header class="game-topbar">
        <div><b>💣 炸弹猫咪</b><span id="roomCode"></span></div>
        <div class="header-actions">
          <button id="rulesButton" class="icon-button" aria-label="游戏规则">📖</button>
          <button id="leaveButton" class="icon-button leave-button" aria-label="退出房间">🚪</button>
        </div>
      </header>

      <section class="arena">
        <section id="players" class="players"></section>
        <div class="table-center">
          <div id="deck" class="deck-core">🃏 牌堆 0</div>
          <div id="directionBadge" class="direction-badge">↺</div>
          <div id="turn"></div>
        </div>
      </section>

      <section class="middle-panel">
        <div id="notice"></div>
        <div id="actions"></div>
        <div class="log-shell">
          <button id="logToggle" class="log-toggle" type="button">📜 事件记录</button>
          <div id="log" class="log"></div>
        </div>
      </section>

      <section class="hand-dock">
        <div class="hand-title">我的手牌</div>
        <section id="hand" class="hand"></section>
      </section>

      <button id="chatBubbleButton" class="chat-bubble-button" type="button">💬</button>
      <section id="chatPanel" class="chat-section collapsed">
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" maxlength="120" autocomplete="off" placeholder="说点什么">
          <button type="submit">发送</button>
        </form>
      </section>
    </section>
  </main>

  <div id="effectOverlay" class="effect-overlay hidden" aria-live="assertive">
    <div class="effect-burst"></div>
    <div id="effectIcon" class="effect-icon"></div>
    <div id="effectActors" class="effect-actors"></div>
    <div id="effectTitle" class="effect-title"></div>
    <div id="effectSubtitle" class="effect-subtitle"></div>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <button id="modalClose" class="modal-close" aria-label="关闭">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>
  <div id="toast"></div>
  <script src="app.js"></script>
</body>

</html>
